AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
    Hidayah Backend Service

Globals:
    Function:
        MemorySize: 128
        Timeout: 60
        Tracing: Active
        Runtime: provided.al2023
        LoggingConfig:
            LogGroup: !Sub /hidayah/${StageName}/api
            LogFormat: JSON
        Environment:
            Variables:
                STAGE: !Sub ${StageName}

Parameters:
    StageName:
        Type: String
        Default: dev
        Description: The stage name for the API Gateway.

Resources:

    DuaApi:
        Type: AWS::ApiGateway::RestApi
        Properties:
            Name: !Sub ${AWS::StackName}
            Description: !Sub Hidayah Backend Service ( ${StageName} )
            EndpointConfiguration:
                Types:
                    - REGIONAL

# Default Gateway Responses
    GatewayResponseBadRequestBody:
        Type: AWS::ApiGateway::GatewayResponse
        Properties:
            RestApiId: !Ref DuaApi
            ResponseType: BAD_REQUEST_BODY
            StatusCode: 400
            ResponseTemplates:
                application/json: '{"statusCode": 400, "message": "Bad request, please check your input", "error": "BAD_REQUEST", "data": null}'

    GatewayResponseBadRequestParameters:
        Type: AWS::ApiGateway::GatewayResponse
        Properties:
            RestApiId: !Ref DuaApi
            ResponseType: BAD_REQUEST_PARAMETERS
            StatusCode: 400
            ResponseTemplates:
                application/json: '{"statusCode": 400, "message": "Bad request, please check your input", "error": "BAD_REQUEST", "data": null}'

    GatewayResponseResourceNotFound:
        Type: AWS::ApiGateway::GatewayResponse
        Properties:
            RestApiId: !Ref DuaApi
            ResponseType: RESOURCE_NOT_FOUND
            StatusCode: 404
            ResponseTemplates:
                application/json: '{"statusCode": 404, "message": "Endpoint does not exist", "error": "RESOURCE_NOT_FOUND", "data": null}'

    GatewayResponseDefault5xx:
        Type: AWS::ApiGateway::GatewayResponse
        Properties:
            RestApiId: !Ref DuaApi
            ResponseType: DEFAULT_5XX
            StatusCode: 500
            ResponseTemplates:
                application/json: '{"statusCode": 500, "message": "Internal server error", "error": "SERVER_ERROR", "data": null}'

# RESOURCES
    DuaResource:
        Type: AWS::ApiGateway::Resource
        Properties:
            ParentId: !GetAtt DuaApi.RootResourceId
            PathPart: dua
            RestApiId: !Ref DuaApi

    GenerateResource:
        Type: AWS::ApiGateway::Resource
        Properties:
            ParentId: !Ref DuaResource
            PathPart: generate
            RestApiId: !Ref DuaApi

    AudioResource:
        Type: AWS::ApiGateway::Resource
        Properties:
            ParentId: !Ref DuaResource
            PathPart: audio
            RestApiId: !Ref DuaApi

# MODELS
    GenerateDuaModel:
        Type: AWS::ApiGateway::Model
        Properties:
            RestApiId: !Ref DuaApi
            ContentType: application/json
            Description: Model for dua generation request
            Schema:
                $schema: http://json-schema.org/draft-04/schema#
                title: GenerateDuaModel
                type: object
                required:
                  - prompt
                properties:
                    prompt:
                        type: string
                        minLength: 1
                        maxLength: 500

    GenerateAudioModel:
        Type: AWS::ApiGateway::Model
        Properties:
            RestApiId: !Ref DuaApi
            ContentType: application/json
            Description: Model for audio generation request
            Schema:
                $schema: http://json-schema.org/draft-04/schema#
                title: GenerateAudioModel
                type: object
                required:
                  - text
                properties:
                    text:
                        type: string
                        minLength: 1

    GenerateAudioMethod:
        Type: AWS::ApiGateway::Method
        Properties:
            RestApiId: !Ref DuaApi
            ResourceId: !Ref AudioResource
            HttpMethod: POST
            AuthorizationType: NONE
            RequestValidatorId: !Ref PostValidator
            RequestModels:
                application/json: !Ref GenerateAudioModel
            Integration:
                Type: AWS_PROXY
                IntegrationHttpMethod: POST
                Uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GenerateAudio.Arn}/invocations

# PERMISSIONS
    GenerateAudioPermission:
        Type: AWS::Lambda::Permission
        Properties:
            Action: lambda:InvokeFunction
            FunctionName: !Ref GenerateAudio
            Principal: apigateway.amazonaws.com
            SourceArn: !Sub arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${DuaApi}/*/*

# REQUEST VALIDATORS
    PostValidator:
        Type: AWS::ApiGateway::RequestValidator
        Properties:
            RestApiId: !Ref DuaApi
            ValidateRequestBody: true
            ValidateRequestParameters: false

# LAMBDAS
    GenerateDua:
        Type: AWS::Serverless::Function
        Metadata:
            BuildMethod: makefile
        Properties:
            Description: !Sub
                - Stack ${AWS::StackName} Function ${ResourceName}
                - ResourceName: GenerateDua
            CodeUri: .
            Handler: bootstrap
            Runtime: provided.al2023
            MemorySize: 512
            Timeout: 60
            Architectures:
                - arm64
            FunctionUrlConfig:
                AuthType: NONE
                InvokeMode: RESPONSE_STREAM
                Cors:
                    AllowCredentials: false
                    AllowHeaders:
                        - "*"
                    AllowMethods:
                        - POST
                    AllowOrigins:
                        - "*"
                    ExposeHeaders:
                        - content-type
                    MaxAge: 86400
            Policies:
                - Statement:
                    - Effect: Allow
                      Action:
                      - ssm:GetParameter
                      - kms:Decrypt
                      Resource:
                      - !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hidayah/${StageName}/*
                      - !Sub arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*

    GenerateAudio:
        Type: AWS::Serverless::Function
        Metadata:
            BuildMethod: makefile
        Properties:
            Description: !Sub
                - Stack ${AWS::StackName} Function ${ResourceName}
                - ResourceName: GenerateAudio
            CodeUri: .
            Handler: bootstrap
            Runtime: provided.al2023
            MemorySize: 512
            Timeout: 60
            Architectures:
                - arm64
            Policies:
                - Statement:
                    - Effect: Allow
                      Action:
                      - ssm:GetParameter
                      - kms:Decrypt
                      Resource:
                      - !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/hidayah/${StageName}/*
                      - !Sub arn:${AWS::Partition}:kms:${AWS::Region}:${AWS::AccountId}:key/*

# DEPLOYMENTS
    DuaDeployment:
        Type: AWS::ApiGateway::Deployment
        DependsOn:
            - GenerateAudioMethod
        Properties:
            RestApiId: !Ref DuaApi
            StageName: !Sub ${StageName}
            Description: streaming-v2

# LOG GROUPS
    LogGroup:
        Type: AWS::Logs::LogGroup
        DeletionPolicy: Retain
        UpdateReplacePolicy: Retain
        Properties:
            RetentionInDays: 7
            LogGroupName: !Sub /hidayah/${StageName}/api

Outputs:
    Api:
        Description: API Gateway endpoint URL (GenerateAudio)
        Value: !Sub "https://${DuaApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${StageName}/"

    GenerateDuaFunctionUrl:
        Description: Lambda Function URL for GenerateDua SSE streaming
        Value: !GetAtt GenerateDuaUrl.FunctionUrl
